<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>
  <link rel="stylesheet" href="/error-base.css">
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1 id="t"></h1>
    <p id="d"></p>
    <div class="actions">
      <a class="btn btn-ghost" href="javascript:history.back()" id="b"></a>
    </div>
  </div>
  <script>
    var zh = navigator.language.startsWith('zh');
    document.getElementById('t').textContent = zh ? '项目不存在' : 'Project Not Found';
    document.getElementById('d').textContent = zh
      ? '您访问的项目不存在或尚未发布。'
      : "The project you're looking for doesn't exist or hasn't been published.";
    document.getElementById('b').textContent = zh ? '返回' : 'Go Back';
  </script>
</body>
</html>
