<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403</title>
  <link rel="stylesheet" href="/error-base.css">
</head>
<body>
  <div class="card">
    <div class="code">403</div>
    <h1 id="t"></h1>
    <p id="d"></p>
    <div class="actions" id="actions"></div>
  </div>
  <script>
    var zh = navigator.language.startsWith('zh');
    var sf = window.__SF || {};
    var project   = sf.project;
    var workspace = sf.workspace;

    document.getElementById('t').textContent = zh ? '内容不可在此访问' : 'Content Not Available Here';
    document.getElementById('d').textContent = zh
      ? '此项目已被手动设置为不安全的站点，无法通过安全域名访问。如需访问，请联系项目所有者更改项目设置。'
      : 'This project is not configured for secure hosting and cannot be accessed on this domain. If you need access, please contact the project owner to change the project settings.';

    if (workspace) {
      var href  = project ? '//' + workspace + '/s/' + project + '/' : '//' + workspace;
      var label = zh ? (project ? '在主站查看此项目' : '访问主站') : (project ? 'View on Main Site' : 'Visit Main Site');
      document.getElementById('actions').innerHTML = '<a class="btn" href="' + href + '">' + label + '</a>';
    }
  </script>
</body>
</html>
